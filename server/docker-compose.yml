services:
  proxy:
    build:
      context: .
      dockerfile: Dockerfile
    image: smart-assistance-proxy:latest
    container_name: smart-assistance-proxy
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).status == 200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    # Sécurité : système de fichiers en lecture seule + capacités minimales.
    read_only: true
    tmpfs:
      - /tmp:size=16M
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
